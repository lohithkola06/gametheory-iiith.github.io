<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Geist';
            src: url('/mnt/data/GeistVF.woff') format('woff');
        }

        @font-face {
            font-family: 'Geist Mono';
            src: url('/mnt/data/GeistMonoVF.woff') format('woff');
        }

        @font-face {
            font-family: 'CinzelVF';
            src: url('/mnt/data/CinzelVF.ttf') format('truetype');
        }

        body {
            font-family: 'Geist', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 3em;
            font-weight: normal;
            margin-bottom: 16px;
            text-align: center;
            font-family: 'CinzelVF', serif;
            letter-spacing: 0.1em;
        }

        .divider {
            width: 300px;
            height: 1px;
            background-color: #ededed;
            margin: 10px auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            width: 90%;
        }

        .gallery img {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>Gallery</h1>
    <div class="divider"></div>
    <div class="gallery">
        <img src="https://via.placeholder.com/300" alt="Image 1">
        <img src="https://via.placeholder.com/300" alt="Image 2">
        <img src="https://via.placeholder.com/300" alt="Image 3">
        <img src="https://via.placeholder.com/300" alt="Image 4">
        <img src="https://via.placeholder.com/300" alt="Image 5">
        <img src="https://via.placeholder.com/300" alt="Image 6">
    </div>
</body>
</html>
